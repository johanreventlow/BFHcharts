# SPC Analysetekster - fallback når AI ikke er tilgængelig
#
# Hver nøgle indeholder named variants: short, standard, detailed.
# pick_text() vælger den længste variant der passer inden for budgettet.
#
# Placeholders (erstattes med faktiske værdier):
#   {runs_actual}        - Faktisk længste serie
#   {runs_expected}      - Forventet maksimum for serie
#   {crossings_actual}   - Faktisk antal krydsninger
#   {crossings_expected} - Forventet minimum for krydsninger
#   {outliers_actual}    - Antal observationer uden for kontrolgrænser
#   {centerline}         - Centerlinjens værdi
#   {target}             - Målværdi (formateret)
#   {n_points}           - Antal datapunkter

stability:
  no_variation:
    short: "Niveauet er konstant på {centerline}."
    standard: "Niveauet er konstant på {centerline}. Processen kan ikke vurderes med statistisk proceskontrol."
    detailed: "Niveauet er konstant på {centerline}. Da alle datapunkter er identiske, kan processen ikke vurderes med statistisk proceskontrol."

  no_signals:
    short: "Processen er stabil og forudsigelig."
    standard: "Processen er stabil og forudsigelig. Variationen er naturlig og uden systematiske ændringer."
    detailed: "Processen er stabil og forudsigelig. Variationen er naturlig og uden tegn på systematiske ændringer."

  runs_only:
    short: "Der er tegn på et skift i procesniveauet."
    standard: "Der er tegn på et skift i procesniveauet. Længste serie ({runs_actual}) overstiger forventet ({runs_expected})."
    detailed: "Der er tegn på et skift i procesniveauet. Længste serie ({runs_actual}) overstiger det forventede maksimum ({runs_expected}). Dette indikerer, at processen har ændret sig."

  crossings_only:
    short: "Der er tegn på gruppering i data."
    standard: "Der er tegn på gruppering i data. Antallet af krydsninger ({crossings_actual}) er under forventet minimum ({crossings_expected})."
    detailed: "Der er tegn på gruppering i data. Antallet af krydsninger ({crossings_actual}) er under forventet minimum ({crossings_expected}). Datapunkterne varierer ikke tilfældigt omkring centrallinjen."

  outliers_only:
    short: "Der er fundet {outliers_actual} observation(er) uden for kontrolgrænserne."
    standard: "Der er fundet {outliers_actual} observation(er) uden for kontrolgrænserne. Disse bør undersøges for særlige årsager."
    detailed: "Der er fundet {outliers_actual} observation(er) uden for kontrolgrænserne. Disse afvigelser bør undersøges for særlige årsager, da de kan skyldes usædvanlige hændelser eller målefejl."

  runs_crossings:
    short: "Processen viser systematisk ustabilitet."
    standard: "Processen viser systematisk ustabilitet. Både serielængde ({runs_actual} > {runs_expected}) og krydsninger ({crossings_actual} < {crossings_expected}) afviger."
    detailed: "Processen viser systematisk ustabilitet. Både serielængde ({runs_actual} > {runs_expected}) og antal krydsninger ({crossings_actual} < {crossings_expected}) afviger fra det forventede. Dette peger på en grundlæggende procesændring."

  runs_outliers:
    short: "Processen viser niveauskift og ekstreme værdier."
    standard: "Processen viser et niveauskift (serielængde {runs_actual} > {runs_expected}) og {outliers_actual} observation(er) uden for kontrolgrænserne."
    detailed: "Processen viser et niveauskift (serielængde {runs_actual} > {runs_expected}) og {outliers_actual} observation(er) uden for kontrolgrænserne. Undersøg, om niveauskiftet og de ekstreme værdier har samme underliggende årsag."

  crossings_outliers:
    short: "Processen viser gruppering og ekstreme værdier."
    standard: "Processen viser gruppering (krydsninger {crossings_actual} < {crossings_expected}) og {outliers_actual} observation(er) uden for kontrolgrænserne."
    detailed: "Processen viser gruppering (krydsninger {crossings_actual} < {crossings_expected}) og {outliers_actual} observation(er) uden for kontrolgrænserne. Dette mønster kan indikere, at processen påvirkes af skiftende betingelser."

  all_signals:
    short: "Processen er ustabil med flere samtidige signaler."
    standard: "Processen er ustabil med flere samtidige signaler: niveauskift, gruppering og {outliers_actual} observation(er) uden for kontrolgrænserne."
    detailed: "Processen er ustabil med flere samtidige signaler: niveauskift (serielængde {runs_actual} > {runs_expected}), gruppering (krydsninger {crossings_actual} < {crossings_expected}) og {outliers_actual} observation(er) uden for kontrolgrænserne. En grundig analyse anbefales."

target:
  at_target:
    short: "Niveauet ligger tæt på målet ({target})."
    standard: "Niveauet ligger tæt på målet ({target})."
  over_target:
    short: "Niveauet ligger over målet ({target})."
    standard: "Niveauet ligger over målet ({target})."
  under_target:
    short: "Niveauet ligger under målet ({target})."
    standard: "Niveauet ligger under målet ({target})."

action:
  stable_at_target:
    short: "Fortsæt nuværende praksis."
    standard: "Fortsæt den nuværende praksis og overvåg processen løbende."
    detailed: "Fortsæt den nuværende praksis og overvåg processen løbende for at fastholde det aktuelle niveau."
  stable_not_at_target:
    short: "En målrettet procesændring er nødvendig."
    standard: "Processen er stabil, men når ikke målet. En målrettet procesændring er nødvendig."
    detailed: "Processen er stabil, men når ikke målet. En målrettet procesændring er nødvendig. Den nuværende praksis vil fortsætte med at levere de samme resultater."
  stable_no_target:
    short: "Overvej at fastsætte et mål for indikatoren."
    standard: "Overvej at fastsætte et mål for indikatoren for at vurdere, om niveauet er tilfredsstillende."
    detailed: "Overvej at fastsætte et mål for indikatoren for at kunne vurdere, om det aktuelle niveau er tilfredsstillende, og om der er behov for forbedring."
  unstable_at_target:
    short: "Processen er ustabil — identificér årsagerne til variationen."
    standard: "Selvom målet aktuelt er opfyldt, er processen ustabil. Identificér årsagerne til variationen."
    detailed: "Selvom målet aktuelt er opfyldt, er processen ustabil. Identificér årsagerne til variationen for at sikre, at niveauet kan fastholdes."
  unstable_not_at_target:
    short: "Identificér og fjern de særlige årsager til variationen."
    standard: "Prioritér at identificere og fjerne de særlige årsager til variationen."
    detailed: "Prioritér at identificere og fjerne de særlige årsager til variationen, før yderligere forbedringstiltag iværksættes."
  unstable_no_target:
    short: "Undersøg årsagerne til den usædvanlige variation."
    standard: "Identificér og undersøg årsagerne til den usædvanlige variation."
    detailed: "Identificér og undersøg årsagerne til den usædvanlige variation. Når processen er under kontrol, kan der fastsættes et realistisk mål."

padding:
  data_points:
    short: "Baseret på {n_points} datapunkter."
    standard: "Analysen er baseret på {n_points} datapunkter."
  generic:
    short: "Løbende opfølgning anbefales."
    standard: "Nye datapunkter kan ændre billedet, så løbende opfølgning anbefales."
