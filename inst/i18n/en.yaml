# BFHcharts i18n — English (en)
#
# Initial English translation. All keys must mirror da.yaml exactly.

# ==============================================================================
# ANALYSIS TEXTS
# ==============================================================================

analysis:

  stability:
    no_variation:
      short: "The level is constant at {centerline}."
      standard: "The level is constant at {centerline}. The process cannot be assessed using statistical process control."
      detailed: "The level is constant at {centerline}. Because all data points are identical, statistical process control cannot be applied."

    majority_at_centerline:
      # Triggered when >= 50% of data points lie EXACTLY on the centerline
      # but not all are identical. Typically flags discrete reporting or
      # coarse measurement scale that degrades SPC interpretation.
      short: "Many data points lie exactly on the centerline ({centerline})."
      standard: "A large share of the data points lie exactly on the centerline ({centerline}), which may indicate limited measurement resolution."
      detailed: "A large share of the data points lie exactly on the centerline ({centerline}). This may be due to coarse measurement scale or discrete reporting, which weakens SPC interpretation."

    auto_mean_unstable:
      # Triggered when bfh_qic() auto-switched CL from median to mean
      # (>= 50% of points fell on the median), but signals are still
      # present after the switch. SPC interpretation is weakened --
      # signals may be artefacts of the switch or of the discrete
      # measurement scale that triggered it. Suppresses the cl_auto_mean
      # tail caveat (same information is conveyed here).
      short: "The centerline has been switched to the mean, and signals are unreliable."
      standard: "Many data points fell exactly on the median, so the centerline has been switched to the mean. Any signals should be interpreted with caution."
      detailed: "Many data points fell exactly on the median, so the centerline has been switched to the mean. The analysis is not well suited to assess the process, and signals should be interpreted with great caution."

    no_signals:
      short: "The process is stable and predictable."
      standard: "The process is stable and predictable. Variation is natural with no systematic changes."
      detailed: "The process is stable and predictable. Variation is natural and shows no signs of systematic change."

    runs_only:
      short: "There are signs of a shift in the process level."
      standard: "There are signs of a shift in the process level. The longest run ({runs_actual}) exceeds the expected maximum ({runs_expected})."
      detailed: "There are signs of a shift in the process level. The longest run ({runs_actual}) exceeds the expected maximum ({runs_expected}), suggesting a systematic change."

    crossings_only:
      short: "Data points cluster around the centre line."
      standard: "Data points cluster around the centre line. The number of crossings ({crossings_actual}) is below the expected minimum ({crossings_expected})."
      detailed: "Data points cluster above or below the centre line rather than varying randomly. The number of crossings ({crossings_actual}) is below the expected minimum ({crossings_expected})."

    outliers_only:
      short: "{outliers_actual} {outliers_word} outside the control limits."
      standard: "{outliers_actual} of the most recent {effective_window} observations are outside the control limits and should be investigated for special causes."
      detailed: "{outliers_actual} of the most recent {effective_window} observations are outside the control limits. They should be investigated for special causes, as they may result from unusual events or measurement errors."

    runs_crossings:
      short: "The process shows systematic instability."
      standard: "The process shows systematic instability. Both the run length ({runs_actual} > {runs_expected}) and the number of crossings ({crossings_actual} < {crossings_expected}) deviate from expected."
      detailed: "The process shows systematic instability. Both the run length ({runs_actual} > {runs_expected}) and the number of crossings ({crossings_actual} < {crossings_expected}) deviate from expected, pointing to a fundamental process change."

    runs_outliers:
      short: "The process shows a level shift and {outliers_actual} {outliers_word} outside the control limits."
      standard: "The process shows a level shift (run length {runs_actual} > {runs_expected}), and {outliers_actual} of the most recent {effective_window} observations are outside the control limits."
      detailed: "The process shows a level shift (run length {runs_actual} > {runs_expected}), and {outliers_actual} of the most recent {effective_window} observations are outside the control limits. Investigate whether the level shift and the outlying measurements share a common root cause."

    crossings_outliers:
      short: "The process shows clustering and {outliers_actual} {outliers_word} outside the control limits."
      standard: "Data points cluster (crossings {crossings_actual} < {crossings_expected}), and {outliers_actual} of the most recent {effective_window} observations are outside the control limits."
      detailed: "Data points cluster around the centre line (crossings {crossings_actual} < {crossings_expected}), and {outliers_actual} of the most recent {effective_window} observations are outside the control limits. This pattern may indicate shifting process conditions."

    all_signals:
      short: "The process is unstable with multiple simultaneous signals."
      standard: "The process is unstable with multiple simultaneous signals: level shift and clustering, plus {outliers_actual} of the most recent {effective_window} observations outside the control limits."
      detailed: "The process is unstable with multiple simultaneous signals: level shift (run length {runs_actual} > {runs_expected}), clustering around the centre line (crossings {crossings_actual} < {crossings_expected}), and {outliers_actual} of the most recent {effective_window} observations outside the control limits. Investigate common and special causes systematically."

  anhoej_not_evaluable: "not evaluable (series too short)"

  # Slice 3-5 INCLUDE: modifier-clauses.
  # Templates are clause-form (lowercase, no trailing period). Composed
  # into ONE coherent sentence by .compose_modifier_sentence() in
  # spc_render.R (cycle 05 finding #2 fix). Sentence-frame chosen by
  # composer based on which modifiers are active.
  modifier:
    # Magnitude-bucket clause. {pct_abs} = |delta|/baseline as %.
    magnitude:
      small:
        short: "~{pct_abs}% change"
        standard: "a minor change of ~{pct_abs}%"
        detailed: "a minor level change of ~{pct_abs}%"
      medium:
        short: "~{pct_abs}% change"
        standard: "a change of ~{pct_abs}%"
        detailed: "a moderate level change of ~{pct_abs}%"
      large:
        short: "~{pct_abs}% change"
        standard: "a substantial change of ~{pct_abs}%"
        detailed: "a substantial level change of ~{pct_abs}%"

    # Direction-clause. Composer joins without comma (flows naturally
    # after preceding magnitude or baseline_delta).
    direction:
      favorable:
        short: "in the desired direction"
        standard: "in the desired direction"
        detailed: "in the desired direction"
      unfavorable:
        short: "in an undesired direction"
        standard: "in an undesired direction"
        detailed: "away from the desired direction"

    # Baseline-delta sentence-frame. Composer uses 'lead' when combined
    # with magnitude/direction; 'standalone' when baseline_delta is sole
    # active modifier (terminated with period).
    baseline_delta:
      lead:
        short: "The level has shifted from {baseline_value} to {current_value}"
        standard: "The level has shifted from {baseline_value} to {current_value} since the previous phase"
        detailed: "Compared with the previous phase the level has shifted from {baseline_value} to {current_value}"
      standalone:
        short: "The level has shifted from {baseline_value} to {current_value}."
        standard: "The level has shifted from {baseline_value} to {current_value} since the previous phase."
        detailed: "Compared with the previous phase the level has shifted from {baseline_value} to {current_value}."

    # Compose-frames: used when baseline_delta NOT active but magnitude
    # and/or direction present. {clauses} = magnitude + direction joined.
    compose:
      mod_only:
        short: "The level shows {clauses}."
        standard: "The level shows {clauses}."
        detailed: "The level shows {clauses}."
      dir_only:
        short: "The level is moving {clauses}."
        standard: "The level is moving {clauses}."
        detailed: "The level is moving {clauses}."

  # Slice 8 INCLUDE: Few-obs / not-evaluable. When confidence_tier=="low"
  # replaces the entire stability-base section.
  #
  # Cycle 05 finding #5: dispatch on low_confidence_reason so prose
  # matches actual cause (few_obs / no_centerline / no_spread).
  # Previously always "With only {n_points}..." even when n >= N_MIN
  # but centerline or spread was missing -- clinically misleading.
  base:
    not_evaluable:
      few_obs:
        short: "Series too short for assessment."
        standard: "With only {n_points} observations the process cannot yet be reliably assessed with statistical process control."
        detailed: "With only {n_points} observations the data is too sparse for reliable assessment with statistical process control. Anhoej rules typically require at least 12 observations for detection power."
      no_centerline:
        short: "Missing computable control baseline."
        standard: "The series cannot be reliably assessed with statistical process control because no centerline could be computed."
        detailed: "With {n_points} observations no computable control baseline (missing centerline) is available, so Anhoej rules cannot be applied to the series."
      no_spread:
        short: "Missing computable variation."
        standard: "The series cannot be reliably assessed with statistical process control because variation in the data cannot be estimated."
        detailed: "With {n_points} observations the spread in the data cannot be reliably estimated, so control limits and Anhoej rules are not meaningful for the series."

  target:
    at_target:
      short: "The level is close to the target ({target})."
      standard: "The level is close to the target ({target})."
      detailed: "The level is close to the target ({target})."
    over_target:
      short: "The level is above the target ({target})."
      standard: "The level is above the target ({target})."
      detailed: "The level is above the target ({target}); whether this is desirable depends on the indicator."
    under_target:
      short: "The level is below the target ({target})."
      standard: "The level is below the target ({target})."
      detailed: "The level is below the target ({target}); whether this is desirable depends on the indicator."
    goal_met:
      short: "The target ({target}) has been met."
      standard: "The level meets the target ({target})."
      detailed: "The level meets the target ({target}) and is on the desired side of the target value."
    goal_not_met:
      short: "The target ({target}) has not yet been met."
      standard: "The level does not yet meet the target ({target})."
      detailed: "The level does not yet meet the target ({target}). Current practice does not achieve it."
    near_target:
      # Used when CL is on the wrong side of target but within 3*sigma_hat
      # (or sd(y)) -- statistically indistinguishable from the target.
      # {level_direction} renders as "above"/"below"/"at".
      short: "The level is just {level_direction} the target ({target})."
      standard: "The current level is just {level_direction} the target ({target})."
      detailed: "The current level of {centerline} is just {level_direction} the target ({target})."

  action:
    stable_at_target:
      short: "Continue current practice."
      standard: "Continue current practice and monitor the process on an ongoing basis."
      detailed: "Continue current practice and monitor the process on an ongoing basis to maintain the current level."
    stable_not_at_target:
      short: "A targeted effort is needed to reach the goal."
      standard: "The process is stable but does not meet the target. A targeted effort is required to shift the level."
      detailed: "The process is stable but does not meet the target. Without a targeted effort, current practice will continue to deliver the same level."
    stable_no_target:
      short: "Consider setting a target for the indicator."
      standard: "Consider setting a target for the indicator so the level can be assessed."
      detailed: "Consider setting a target for the indicator so the current level can be assessed and the need for improvement can be prioritised."
    unstable_at_target:
      short: "Investigate the causes of variation."
      standard: "Although the target is currently met, the process is unstable. Investigate the causes of variation."
      detailed: "Although the target is currently met, the process is unstable. Investigate the causes of variation to sustain the current level."
    unstable_not_at_target:
      short: "Identify and remove the special causes of variation."
      standard: "Prioritise identifying and removing the special causes of variation before implementing further measures."
      detailed: "Prioritise identifying and removing the special causes of variation. Only once the process is stable can the effect of new improvement measures be reliably assessed."
    unstable_no_target:
      short: "Stabilise the process first, then set a target."
      standard: "Investigate the causes of variation. Once the process is stabilised, a realistic target can be set."
      detailed: "Investigate the causes of unusual variation. Once the process is under control, it is meaningful to set a realistic target and plan improvement efforts."
    stable_goal_met:
      short: "Continue current practice."
      standard: "The process is stable and meets the target. Continue current practice and monitor on an ongoing basis."
      detailed: "The process is stable and meets the target. Continue current practice and monitor on an ongoing basis to sustain the current level."
    stable_goal_not_met:
      short: "A targeted effort is needed."
      standard: "The process is stable but does not meet the target. A targeted effort is required to shift the level in the desired direction."
      detailed: "The process is stable but does not meet the target. Without a targeted effort, current practice will continue to deliver the same level and thus fail to meet the target."
    unstable_goal_met:
      short: "Stabilise the process to sustain goal achievement."
      standard: "Although the target is currently met, the process is unstable. Investigate the causes of variation to sustain goal achievement."
      detailed: "Although the target is currently met, the process is unstable. Investigate the causes of variation so the current level can be sustained and goal achievement is not lost."
    stable_near_target:
      # Statistically near target but on the wrong side ({level_direction}).
      # Text framed as practically meeting the target.
      short: "The level is essentially at the target."
      standard: "The level is close enough to the target to be effectively met. Continue to monitor."
      detailed: "The level is just {level_direction} the target but within the process's natural variation. Monitor on an ongoing basis."
    unstable_near_target:
      # Like stable_near_target but unstable -- stabilisation focus.
      short: "Stabilise the process to ensure continued goal achievement."
      standard: "The level is close to the target but the process is unstable. Investigate the causes of variation."
      detailed: "The level is just {level_direction} the target but the process is unstable. Stabilise it so goal achievement can be sustained."
    unstable_goal_not_met:
      short: "Stabilise the process first, then work towards the target."
      standard: "The process is unstable and does not meet the target. First identify the special causes of variation before implementing targeted measures."
      detailed: "The process is unstable and does not meet the target. First identify the special causes of variation — only once the process is stable can the effect of new improvement measures towards the target be reliably assessed."

    auto_mean_unstable_goal_met:
      # Parallel to stability.auto_mean_unstable when the target (or
      # value-neutral at_target / near_target) is met. Frame: maintain
      # current practice but refine the measurement scale so future SPC
      # analyses become reliable.
      short: "Maintain practice, but consider a finer measurement scale."
      standard: "Maintain current practice and consider refining the measurement scale so future analyses become more reliable."
      detailed: "Maintain current practice. Consider refining the measurement scale so the analysis can reliably separate real variation from artefacts."

    auto_mean_unstable_goal_not_met:
      # Parallel to stability.auto_mean_unstable when the target is not
      # met (or no target). Frame: before deciding on action, refine the
      # measurement scale so the decision can be based on reliable analysis.
      short: "Refine the measurement scale before deciding on action."
      standard: "Before deciding on targeted action, consider refining the measurement scale so the decision can be supported reliably."
      detailed: "Before deciding on targeted action, consider refining the measurement scale. The current analysis cannot separate real variation from artefacts."

# ==============================================================================
# LABELS
# ==============================================================================

labels:

  interval:
    daily: "day"
    weekly: "week"
    monthly: "month"
    quarterly: "quarter"
    yearly: "year"
    irregular: "period"

  outliers:
    singular: "observation"
    plural: "observations"

  # Target-relative position of centerline. Used by {level_direction} and
  # {level_vs_target} placeholders in analysis texts. Strict equality
  # (|centerline - target| < 1e-9) triggers the "at" variant.
  level_direction:
    over: "above"
    under: "below"
    at: "at"

  level_vs_target:
    over: "is above the target"
    under: "is below the target"
    at: "is at the target"

  details:
    periode: "Period"
    gns: "Avg."
    seneste: "Latest"
    niveau_label: "Current level"
    niveau_unknown: "Current level: -"

  chart:
    current_level: "CUR. LEVEL"
    development_goal: "TARGET"
    baseline: "BASELINE"

  misc:
    ukendt: "unknown"

  caveats:
    cl_user_supplied: >-
      Centerline manually specified — Anhøj signal computed against the user-supplied centerline, not the data-estimated process mean.
    cl_auto_mean: >-
      Centerline switched to mean because at least half of the observations in the last phase fell exactly on the median. The Anhøj analysis is computed against the mean to avoid false-negative signals from discrete data.
    # Slice 14 INCLUDE: discrete-scale mild/moderate tail-caveats.
    # extreme tier is handled via stability.majority_at_centerline template.
    discrete_scale_mild: >-
      Some data points fall exactly on the centerline, suggesting a discrete measurement scale.
    discrete_scale_moderate: >-
      A substantial fraction of data points fall exactly on the centerline, indicating a coarse measurement scale that may impair SPC interpretation.
    # Slice 7 INCLUDE: variable control limits due to changing sample size
    # in p/u/xbar charts.
    variable_cl: >-
      The control limits vary, typically because the denominator/sample size changes over time — interpret deviations with n in each period in mind.
