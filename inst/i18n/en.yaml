    gns: "Avg."
    seneste: "Latest"
    niveau_label: "Current level"
    niveau_unknown: "Current level: -"

  chart:
    current_level: "CUR. LEVEL"
    development_goal: "TARGET"
    baseline: "BASELINE"

  misc:
    ukendt: "unknown"
