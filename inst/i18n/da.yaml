# BFHcharts i18n — Dansk (da)
#
# Struktur:
#   analysis/  - Analysetekster til bfh_generate_analysis() (migr. fra inst/texts/spc_analysis.yml)
#   labels/    - Korte etiketter til detaljer, diagrammer og datointerval

# ==============================================================================
# ANALYSETEKSTER
# Placeholders: {runs_actual}, {runs_expected}, {crossings_actual},
#   {crossings_expected}, {outliers_actual}, {outliers_word},
#   {effective_window}, {centerline}, {target}
#
# Target-relative placeholders (kun meningsfulde naar target er sat - er tomme
# strenge ellers, brug derfor kun i target/action-templates der allerede er
# target-betingede):
#   {level_direction} -> "over" | "under" | "paa"  (single word)
#   {level_vs_target} -> "ligger over maalet" | "ligger under maalet" |
#                        "ligger paa maalet"      (forhaandsformuleret klausul)
#
# Note: "ligger paa maalet" rendres kun ved STRIKT lighed mellem centerlinje
# og target. Brug ikke {level_vs_target} i at_target-templates (som matcher
# bredere sigma-tolerance) -- der vil renderingen ikke matche template-intentionen.
# ==============================================================================

analysis:

  stability:
    no_variation:
      short: "Niveauet er konstant på {centerline}."
      standard: "Niveauet ligger fast på {centerline}, og processen kan derfor ikke vurderes med statistisk proceskontrol."
      detailed: "Niveauet ligger fast på {centerline}. Da alle datapunkter er identiske, kan processen ikke vurderes med statistisk proceskontrol."

    majority_at_centerline:
      # Aktiveres naar >= 50% af datapunkter ligger EKSAKT paa centerlinjen
      # ({centerline}) men ikke alle er identiske. Flag'er typisk diskret
      # rapportering eller grov maaleskala der forringer SPC-tolkning.
      short: "Mange datapunkter ligger præcis på niveaulinjen ({centerline})."
      standard: "En stor del af datapunkterne ligger præcis på niveaulinjen ({centerline}), hvilket kan tyde på begrænset opløsning i målingerne."
      detailed: "En stor del af datapunkterne ligger præcis på niveaulinjen ({centerline}). Analysen ser på variation i data og er derfor ikke velegnet til at vurdere denne proces."

    no_signals:
      short: "Processen er stabil og forudsigelig."
      # standard: "Processen er stabil og forudsigelig. Variationen er naturlig og uden systematiske ændringer."
      standard: "Processen varierer naturligt omkring midten i data og vurderes derfor som stabil og forudsigelig."
      # detailed: "Processen er stabil og forudsigelig. Data varierer naturligt og viser ikke tegn på systematiske ændringer."
      detailed: "Processen varierer naturligt omkring midten i data og vurderes derfor som stabil og forudsigelig, uden tegn på systematiske ændringer."

    runs_only:
      short: "Der er tegn på et skift i processen."
      standard: "Der er tegn på et skift i processens aktuelle niveau. Længste serie ({runs_actual}) er længere end det forventede maksimum ({runs_expected})."
      detailed: "Der er tegn på et skift i processens aktuelle niveau. Den længste serie ({runs_actual}) er længere end det forventede maksimum ({runs_expected}), hvilket tyder på en forandring."

    crossings_only:
      short: "Datapunkterne grupperer sig omkring midten."
      standard: "Datapunkterne har tendens til at gruppere sig, og antal kryds ({crossings_actual}) er under det forventede minimum ({crossings_expected})."
      detailed: "Datapunkterne har tendens til at gruppere sig, frem for at variere så hyppigt omkring midten af data, som man normalt ville forvente. Antal kryds ({crossings_actual}) er under det forventede minimum ({crossings_expected})."

    outliers_only:
      short: "{outliers_actual} {outliers_word} ligger uden for kontrolgrænserne."
      # standard: "{outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne og bør undersøges for særlige årsager."
      standard: "{outliers_actual} af de seneste observationer ligger uden for kontrolgrænserne og bør undersøges for særlige årsager."
      # detailed: "{outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne. De bør undersøges for særlige årsager, da de kan skyldes usædvanlige hændelser."
      detailed: "{outliers_actual} af de seneste observationer ligger uden for kontrolgrænserne. De bør undersøges for særlige årsager, da de kan skyldes usædvanlige hændelser."

    runs_crossings:
      short: "Processen udviser ustabilitet, der ikke er tilfældig."
      standard: "Processen udviser ustabilitet, der ikke er tilfældig. Både længste serie ({runs_actual} > {runs_expected}) og antal kryds ({crossings_actual} < {crossings_expected}) afviger fra det forventede."
      detailed: "Processen udviser ustabilitet, der ikke er tilfældig. Både længste serie ({runs_actual} > {runs_expected}) og antal kryds ({crossings_actual} < {crossings_expected}) afviger fra det forventede og er tegn på en grundlæggende procesændring."

    runs_outliers:
      short: "Processen viser en ændring i niveau og {outliers_actual} {outliers_word} uden for kontrolgrænserne."
      standard: "Processen viser en ændring i niveau (serielængde {runs_actual} > {runs_expected}), og {outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne."
      detailed: "Processen viser en ændring i niveau (serielængde {runs_actual} > {runs_expected}), og {outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne. Undersøg, om ændring i niveau og de afvigende målinger har samme underliggende årsag."

    crossings_outliers:
      short: "Datapunkterne har tendens til at gruppere sig, og der er {outliers_actual} {outliers_word} uden for kontrolgrænserne."
      standard: "Datapunkterne har tendens til at gruppere sig (kryds {crossings_actual} < {crossings_expected}), og {outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne."
      detailed: "Datapunkterne har tendens til at gruppere sig (kryds {crossings_actual} < {crossings_expected}), og {outliers_actual} af de seneste {effective_window} observationer ligger uden for kontrolgrænserne. Dette kan skyldes ændringer i den underliggende proces, som bør undersøges nærmere."

    all_signals:
      short: "Processen er ustabil med flere samtidige signaler."
      standard: "Processen er ustabil med flere samtidige signaler: niveauskift og gruppering samt {outliers_actual} af de seneste {effective_window} observationer uden for kontrolgrænserne."
      detailed: "Processen er ustabil med flere samtidige signaler: niveauskift (serielængde {runs_actual} > {runs_expected}), grupperinger i data (kryds {crossings_actual} < {crossings_expected}) samt {outliers_actual} af de seneste {effective_window} observationer uden for kontrolgrænserne. Undersøg disse signaler for særlig variation systematisk."

  anhoej_not_evaluable: "ikke evaluerbar (for kort serie)"

  target:
    at_target:
      short: "Niveauet ligger tæt på udviklingsmålet ({target})."
      standard: "Det nuværende niveau ligger tæt på udviklingsmålet ({target})."
      detailed: "Det nuværende niveau på {centerline} ligger tæt på udviklingsmålet ({target})."
    over_target:
      short: "Niveauet ligger over målet ({target})."
      standard: "Det nuværende niveau ligger over udviklingsmålet ({target})."
      detailed: "Det nuværende niveau på {centerline} ligger over udviklingsmålet ({target})."
    under_target:
      short: "Niveauet ligger under målet ({target})."
      standard: "Det nuværende niveau ligger under udviklingsmålet ({target})."
      detailed: "Det nuværende niveau på {centerline} ligger under udviklingsmålet ({target})."
    goal_met:
      short: "Målet ({target}) er nået."
      standard: "Det nuværende niveau opfylder udviklingsmålet ({target})."
      # detailed: "Niveauet opfylder målet ({target}) og ligger på den ønskede side af målværdien."
      detailed: "Det nuværende niveau på {centerline} opfylder udviklingsmålet ({target})."
    goal_not_met:
      short: "Målet ({target}) er ikke nået."
      standard: "Det nuværende niveau når ikke udviklingsmålet på {target}."
      # detailed: "Niveauet opfylder ikke målet, og det vil sandsynligvis ikke ske fremover med nuværende praksis."
      detailed: "Det nuværende niveau på {centerline} når ikke udviklingsmålet på {target}, og med nuværende praksis vil dette ikke ændre sig."
    near_target:
      # Bruges naar CL ligger paa forkert side af target men inden for
      # 3*sigma_hat (eller sd(y)) -- statistisk ej til at skelne fra
      # maalet. {level_direction} rendres som "over"/"under"/"paa".
      short: "Niveauet ligger lige {level_direction} udviklingsmålet ({target})."
      standard: "Det nuværende niveau ligger lige {level_direction} udviklingsmålet ({target})."
      detailed: "Det nuværende niveau på {centerline} ligger lige {level_direction} udviklingsmålet ({target})."

  action:
    stable_at_target:
      short: "Fortsæt nuværende praksis."
      standard: "Fortsæt med praksis som hidtil, og overvåg processen løbende."
      detailed: "Fortsæt med praksis som hidtil, og hold øje med processen løbende for ikke at tabe det nuværende niveau."
    stable_not_at_target:
      short: "En målrettet indsats er nødvendig for at nå målet."
      standard: "Der kræves en målrettet indsats for at flytte niveauet mod målet."
      detailed: "Uden en målrettet indsats vil den nuværende praksis fortsætte med at levere det samme resultat."
    stable_no_target:
      short: "Overvej, om et udviklingsmål kan fastsættes."
      standard: "Overvej, om et udviklingsmål kan fastsættes, så det kan vurderes, om niveauet er tilfredsstillende."
      detailed: "Overvej, om et udviklingsmål kan fastsættes, så det aktuelle niveau kan vurderes, og behovet for forbedring kan prioriteres."
    unstable_at_target:
      short: "Undersøg årsagerne til variationen i data."
      standard: "Undersøg årsagerne til, at data ikke varierer tilfældigt."
      detailed: "Undersøg årsagerne til variationen i data, så niveauet kan stabiliseres og fastholdes."
    unstable_not_at_target:
      short: "Identificér og fjern de særlige årsager til variation i data."
      standard: "Prioritér at identificere og fjerne de særlige årsager til variationen i data, før yderligere tiltag iværksættes."
      # detailed: "Prioritér at identificere og fjerne de særlige årsager til variationen i data. Først når processen er stabil, kan effekten af nye forbedringstiltag vurderes pålideligt."
      detailed: "Fjern de særlige årsager til variation i data. Først når processen er stabil, kan effekten af nye tiltag vurderes pålideligt."
    unstable_no_target:
      short: "Stabilisér processen først, og fastsæt derefter et mål, hvis muligt."
      standard: "Undersøg årsagerne til variationen i data. Når processen er stabiliseret, kan et realistisk mål fastsættes, hvis meningsfuldt."
      # detailed: "Undersøg årsagerne til den særlige variation i data. Når processen er under kontrol, kan et realistisk mål fastsættes, hvis meningsfuldt, og forbedringsindsatsen kan planlægges."
      detailed: "Undersøg årsagerne til variationen. Når processen er under kontrol, kan et realistisk mål sættes og forbedringsindsatsen planlægges."
    stable_goal_met:
      short: "Fortsæt den nuværende praksis."
      standard: "Fortsæt den nuværende praksis, og hold løbende øje med data."
      detailed: "Fortsæt den nuværende praksis, men hold løbende øje med data, så niveauet kan fastholdes og evt. forandring fanges tidligt."
    stable_goal_not_met:
      short: "En målrettet indsats er nødvendig."
      standard: "Der kræves en målrettet indsats for at flytte niveauet i den ønskede retning."
      detailed: "Uden en målrettet indsats vil den nuværende praksis fortsætte med at levere samme resultater, {level_direction} målet."
    unstable_goal_met:
      short: "Stabilisér processen for at fastholde målopfyldelsen."
      standard: "Undersøg årsagerne til variationen i data, så målopfyldelsen kan fastholdes."
      # detailed: "Målet er opfyldt, men processen er ustabil. Undersøg årsagerne til variationen i data, så det nuværende niveau kan fastholdes, og målopfyldelsen ikke går tabt."
      detailed: "Find årsagerne til variationen, så niveauet fastholdes og målopfyldelsen ikke går tabt."
    stable_near_target:
      # Statistisk taet paa target men paa forkert side ({level_direction}).
      # Tekst formuleres som om maalet i praksis er naaet.
      short: "Niveauet ligger lige {level_direction} målet."
      standard: "Niveauet ligger meget tæt på målet. Overvåg processen løbende."
      # detailed: "Det nuværende niveau ligger meget tæt på udviklingsmålet. Hold øje med udviklingen."
      detailed: "Overvej, om forbedring er nødvendig, eller acceptér den lille difference, og overvåg blot processen fremover."
    unstable_near_target:
      # Som stable_near_target men ustabil proces -- stabiliseringsfokus.
      short: "Niveauet er tæt på målet. Stabilisér processen."
      standard: "Målet er næsten nået, men processen er ustabil. Undersøg, hvad der påvirker den naturlige variation."
      detailed: "Undersøg, hvad der påvirker processen, og arbejd for at stabilisere den. Vurdér så, om niveauet er tilfredsstillende."
    unstable_goal_not_met:
      short: "Stabilisér processen først, og arbejd derefter mod målet."
      standard: "Identificér først årsager til variationen i data, og stabilisér processen - derefter kan målrettede forbedringstiltag iværksættes."
      # detailed: "Identificér først årsager til variationen i data, og stabilisér processen — først når processen er stabil, kan effekten af nye forbedringstiltag mod målet vurderes pålideligt."
      detailed: "Identificér årsager til variation og stabilisér processen — først derefter kan effekten af nye tiltag mod målet vurderes pålideligt."

# ==============================================================================
# ETIKETTER
# ==============================================================================

labels:

  interval:
    daily: "dag"
    weekly: "uge"
    monthly: "måned"
    quarterly: "kvartal"
    yearly: "år"
    irregular: "periode"

  outliers:
    singular: "observation"
    plural: "observationer"

  # Target-relativ position af centerlinje. Bruges af {level_direction}
  # og {level_vs_target} placeholders i analysis-texts. Strikt lighed
  # (|centerline - target| < 1e-9) udloeser "at"/"paa".
  level_direction:
    over: "over"
    under: "under"
    at: "på"

  level_vs_target:
    over: "ligger over målet"
    under: "ligger under målet"
    at: "ligger på målet"

  details:
    periode: "Periode"
    gns: "Gns."
    seneste: "Seneste"
    niveau_label: "Nuværende niveau"
    niveau_unknown: "Nuværende niveau: -"

  chart:
    current_level: "NUV. NIVEAU"
    development_goal: "UDVIKLINGSMÅL"
    baseline: "BASELINE"

  misc:
    ukendt: "ukendt"

  caveats:
    cl_user_supplied: >-
      Midtlinje fastsat manuelt — Anhøj-signal beregnet mod denne, ikke data-estimeret middelværdi.
    cl_auto_mean: >-
      Niveaulinjen er skiftet til gennemsnit, fordi mindst halvdelen af observationerne i seneste fase lå præcis på medianen. Anhøj-analysen er beregnet mod gennemsnittet for at undgå falske negative signaler ved diskrete data.
