# Workflow for test coverage via covr + Codecov
# Reference: https://github.com/r-lib/actions/tree/v2/examples
# OpenSpec change: strengthen-test-infrastructure (task 1.5)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      BFHCHARTS_TEST_FULL: "true"
      BFHCHARTS_TEST_RENDER: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu \
            fonts-liberation \
            fonts-liberation2 \
            fonts-noto \
            fonts-noto-core \
            fonts-roboto \
            fontconfig
          fc-cache -f -v
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'pre-release'

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        env:
          RUNNER_TEMP_ENV: ${{ runner.temp }}
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP_ENV"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        env:
          RUNNER_TEMP_ENV: ${{ runner.temp }}
        run: |
          find "$RUNNER_TEMP_ENV/package" -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
