# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Layered test execution (see openspec strengthen-test-infrastructure design.md D2).
      BFHCHARTS_TEST_FULL: "true"
      BFHCHARTS_TEST_RENDER: "true"

    steps:
      - uses: actions/checkout@v4

      # Open fallback fonts for rendering tests that otherwise skip_on_ci().
      # Mari fonts are proprietary; Liberation/DejaVu/Noto provide similar
      # metrics for most rendering paths.
      - name: Install system fonts
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu \
            fonts-liberation \
            fonts-liberation2 \
            fonts-noto \
            fonts-noto-core \
            fonts-roboto \
            fontconfig
          fc-cache -f -v
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      # Quarto CLI required for bfh_export_pdf() tests (SystemRequirement per DESCRIPTION).
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'pre-release'

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # BFHtheme + BFHllm haandteres transitivt via Remotes-felt i DESCRIPTION.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Full R CMD check med tests - BFHcharts har ingen kendte test-failures.
      # error-on "error" lader WARNINGs/NOTEs vaere synlige men non-blocking
      # (kan strammes til "warning" senere hvis oensket).
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
