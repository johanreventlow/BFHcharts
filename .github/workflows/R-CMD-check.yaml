# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
name: R-CMD-check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: windows-latest, r: 'release'}
          # R-oldrel-1 kører som allowed-to-fail for at detektere forward-
          # compatibility-issues tidligt. Fejler ikke merge-gate initielt.
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Layered test execution: BFHCHARTS_TEST_FULL enables non-render integration tests.
      # BFHCHARTS_TEST_RENDER is intentionally NOT set: production-template render
      # requires Mari fonts (proprietary, available only via BFHchartsAssets companion
      # package). Render coverage lives in pdf-smoke.yaml with a CI-only test-template
      # using DejaVu fonts.
      BFHCHARTS_TEST_FULL: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # BFHtheme + BFHllm haandteres transitivt via Remotes-felt i DESCRIPTION.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Full R CMD check med tests - BFHcharts har ingen kendte test-failures.
      # error-on "error" lader WARNINGs/NOTEs vaere synlige men non-blocking
      # (kan strammes til "warning" senere hvis oensket).
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
