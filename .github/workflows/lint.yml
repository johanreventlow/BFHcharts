# Workflow for lintr code style checks (advisory mode)
# Reference: https://github.com/r-lib/actions/tree/v2/examples
# OpenSpec change: strengthen-test-infrastructure (task 1.7)
#
# Advisory mode: continue-on-error er aktiveret.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: lint

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint package
        continue-on-error: true
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: false
