# PR-blocking PDF smoke-render workflow for BFHcharts.
#
# Formal:
#   Koerer 1-3 repraesentative bfh_export_pdf()-kald (via tests/smoke/render_smoke.R)
#   paa hver PR til main og develop. Fanger catastrophic Quarto/Typst-pipeline-
#   regressioner FOER de lander i main -- frem for den ugentlige cron-opsnapning i
#   render-tests.yaml.
#
# Font-strategi (Strategi B -- CI-only test-template):
#   Mari er proprataer og kan ikke distribueres i dette public repo.
#   I stedet bruges en minimal CI-only Typst-template (tests/smoke/test-template.typ)
#   der kun refererer DejaVu Sans (installeret via apt-get nedenfor).
#   Production bfh-template.typ (med Mari-fonts) bruges IKKE paa CI.
#
#   render_smoke.R detekterer CI=true (sat af GitHub Actions) og bruger
#   automatisk test-template via template_path-argumentet til bfh_export_pdf().
#   ignore_system_fonts=FALSE paa CI saa Typst finder DejaVu via system fontconfig.
#
#   Env-var BFHCHARTS_SMOKE_FONT_PATH saettes nedenfor (Configure-smoke-render-font-path)
#   som eksplicit font-sti til /usr/share/fonts. render_smoke.R videregiver denne
#   til bfh_export_pdf(..., font_path = ...). Hvis env-var ikke er sat, falder
#   render_smoke.R tilbage til system fontconfig (ignore_system_fonts=FALSE paa CI).
#
# Manuelt trin (branch-protection):
#   Jobbet skal tilfojes til required-status-checks i branch protection rules
#   for main og develop paa GitHub:
#     Settings -> Branches -> Branch protection rules -> [main/develop]
#     -> "Require status checks to pass before merging"
#     -> Soeg efter og tilfoj: "pdf-smoke (ubuntu-latest)"
#
# Sikkerhed: workflow bruger kun safe inputs (github.run_id som integer,
# secrets.GITHUB_TOKEN). Ingen untrusted user-input forwarded til run-steps.
#
# Kilde: openspec/changes/enable-ci-safe-pdf-smoke-render (Strategi B)

name: PDF smoke render

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  pdf-smoke:
    runs-on: ubuntu-latest
    name: pdf-smoke (ubuntu-latest)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts (DejaVu for CI smoke render)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu \
            fonts-liberation \
            fonts-liberation2 \
            fonts-noto \
            fonts-noto-core \
            fonts-roboto \
            fontconfig
          fc-cache -f -v
        shell: bash

      - name: Configure smoke render font path
        run: |
          echo "BFHCHARTS_SMOKE_FONT_PATH=/usr/share/fonts" >> $GITHUB_ENV
          fc-list | head -10
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          # Typst >= 0.13 kræves for --ignore-system-fonts.
          # Quarto >= 1.7.x ships Typst 0.13.x; bruger pre-release indtil stable.
          version: "pre-release"

      - name: Verify Quarto installation
        run: quarto --version
        shell: bash

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pdftools any::withr local::.
          needs: check

      - name: Run PDF smoke render
        run: Rscript tests/smoke/render_smoke.R
        shell: bash

      - name: Upload smoke artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-smoke-failures-${{ github.run_id }}
          path: |
            /tmp/bfhcharts_smoke_*.pdf
            **/*.typ
            **/*.tex.log
          retention-days: 7
          if-no-files-found: warn
