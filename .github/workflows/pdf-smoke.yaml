# PR-blocking PDF smoke-render workflow for BFHcharts.
#
# Formal:
#   Renders 1-3 representative bfh_export_pdf() calls (via tests/smoke/render_smoke.R)
#   on each PR to main and develop. Catches catastrophic Quarto/Typst pipeline
#   regressions before they land in main.
#
# Template strategy (openspec: strengthen-ci-render-pipeline task 3.2):
#   BFHCHARTS_SMOKE_USE_PRODUCTION_TEMPLATE=true is set so render_smoke.R uses
#   inst/templates/typst/bfh-template/bfh-template.typ (production template).
#   DejaVu/Liberation fonts are installed as Mari (proprietary) substitutes.
#
#   continue-on-error: true on the render step while fix-pdf-template-asset-contract
#   is pending merge (production template may depend on untracked assets).
#   Remove continue-on-error once that change is merged.
#
# Branch-protection (MANUAL STEP):
#   This job must be added to required-status-checks in branch protection rules
#   for main and develop on GitHub:
#     Settings -> Branches -> Branch protection rules -> [main/develop]
#     -> "Require status checks to pass before merging"
#     -> Search and add: "pdf-smoke (ubuntu-latest)"
#   See CONTRIBUTING.md for full instructions.
#
# Security: workflow uses only safe inputs (github.run_id as integer,
# secrets.GITHUB_TOKEN). No untrusted user-input forwarded to run-steps.
#
# Sources: openspec/changes/enable-ci-safe-pdf-smoke-render (Strategi B)
#          openspec/changes/strengthen-ci-render-pipeline (task 3.2)

name: PDF smoke render

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  pdf-smoke:
    runs-on: ubuntu-latest
    name: pdf-smoke (ubuntu-latest)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Instructs render_smoke.R to use production template instead of test-template.
      # continue-on-error on the render step until fix-pdf-template-asset-contract merges.
      BFHCHARTS_SMOKE_USE_PRODUCTION_TEMPLATE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install system fonts (DejaVu for CI smoke render)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu \
            fonts-liberation \
            fonts-liberation2 \
            fonts-noto \
            fonts-noto-core \
            fonts-roboto \
            fontconfig
          fc-cache -f -v
        shell: bash

      - name: Configure smoke render font path
        run: |
          echo "BFHCHARTS_SMOKE_FONT_PATH=/usr/share/fonts" >> $GITHUB_ENV
          fc-list | head -10
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          # Typst >= 0.13 kræves for --ignore-system-fonts.
          # Quarto >= 1.7.x ships Typst 0.13.x; bruger pre-release indtil stable.
          version: "pre-release"

      - name: Verify Quarto installation
        run: quarto --version
        shell: bash

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pdftools any::withr local::.
          needs: check

      - name: Run PDF smoke render
        # continue-on-error: true while fix-pdf-template-asset-contract is pending merge.
        # Production template may require untracked assets (fonts/images). Remove once
        # that OpenSpec change is merged and all assets are tracked.
        continue-on-error: true
        run: Rscript tests/smoke/render_smoke.R
        shell: bash

      - name: Verify production template is tracked
        # Ensure the production template file exists in git-tracked source
        run: |
          TMPL="inst/templates/typst/bfh-template/bfh-template.typ"
          if [ ! -f "$TMPL" ]; then
            echo "[SMOKE FAIL] Production template not found: $TMPL" >&2
            exit 1
          fi
          git ls-files --error-unmatch "$TMPL" || {
            echo "[SMOKE FAIL] Production template is not git-tracked: $TMPL" >&2
            exit 1
          }
          echo "[SMOKE OK] Production template is git-tracked: $TMPL"
        shell: bash

      - name: Upload smoke artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-smoke-failures-${{ github.run_id }}
          path: |
            /tmp/bfhcharts_smoke_*.pdf
            **/*.typ
            **/*.tex.log
          retention-days: 7
          if-no-files-found: warn
